  postgres-data:
  redis-data:
  rabbitmq-data:
  localstack-data:
  pact-db-data:
  elasticsearch-data:
  kafka-data:
  tempo-data:
  prometheus-data:
  loki-data:
  alertmanager-data:
  grafana-data:

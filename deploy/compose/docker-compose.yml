# Compose v2+ — version attribute removed (obsolete)

x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_METRICS_EXPORTER: otlp
  OTEL_LOGS_EXPORTER: otlp
  OTEL_TRACES_EXPORTER: otlp

services:
  # ===========================================================================
  # INFRASTRUCTURE
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: rw-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../aspire/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      postgres
        -c wal_level=logical
        -c max_replication_slots=10
        -c max_wal_senders=10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rw-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.15
    container_name: rw-vault
    cap_add:
      - IPC_LOCK
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=dev-root-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
      - VAULT_ADDR=http://127.0.0.1:8200
    ports:
      - "8200:8200"
    command: server -dev
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3
    container_name: rw-localstack
    environment:
      - SERVICES=s3
      - DEBUG=0
      - PERSISTENCE=1
      - AWS_DEFAULT_REGION=us-east-1
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the content-dev bucket so content-svc has somewhere to
  # write on cold boot. Uses the official aws-cli image; LocalStack accepts
  # any non-empty AWS credentials.
  localstack-init:
    image: amazon/aws-cli:latest
    container_name: rw-localstack-init
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        aws --endpoint-url=http://localstack:4566 s3api create-bucket \
          --bucket content-dev --region us-east-1 2>/dev/null || true
        echo "localstack bucket content-dev ready"

  clamav:
    image: clamav/clamav:latest
    container_name: rw-clamav
    ports:
      - "3310:3310"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: rw-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9200/"]
      interval: 5s
      timeout: 5s
      retries: 5

  tempo:
    image: grafana/tempo:latest
    container_name: rw-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ../../infra/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200"   # tempo query

  # ===========================================================================
  # OBSERVABILITY STACK
  # ===========================================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    container_name: rw-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ../../infra/observability/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # otlp grpc
      - "4318:4318"   # otlp http
      - "13133:13133" # health check
      - "8888:8888"   # prometheus metrics
      - "55679:55679" # zpages
    depends_on:
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:13133/"]
      interval: 5s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: rw-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-remote-write-receiver"
      - "--web.enable-lifecycle"
    volumes:
      - ../../infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../infra/observability/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 5s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:2.9.7
    container_name: rw-loki
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ../../infra/observability/loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 5s
      timeout: 5s
      retries: 10

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: rw-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ../../infra/observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"
    environment:
      - ALERTMANAGER_PAGERDUTY_KEY=
      - ALERTMANAGER_SLACK_WEBHOOK=
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 5s
      timeout: 5s
      retries: 5

  pushgateway:
    image: prom/pushgateway:v1.8.0
    container_name: rw-pushgateway
    ports:
      - "9091:9091"

  grafana:
    image: grafana/grafana:10.4.2
    container_name: rw-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ../../infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  pact-db:
    image: postgres:16-alpine
    container_name: rw-pact-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=pact_broker
    volumes:
      - pact-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pact_broker"]
      interval: 5s
      timeout: 5s
      retries: 5

  pact-broker:
    image: pactfoundation/pact-broker:latest
    container_name: rw-pact-broker
    depends_on:
      pact-db:
        condition: service_healthy
    ports:
      - "9292:9292"
    environment:
      - PACT_BROKER_DATABASE_HOST=pact-db
      - PACT_BROKER_DATABASE_PORT=5432
      - PACT_BROKER_DATABASE_NAME=pact_broker
      - PACT_BROKER_DATABASE_USERNAME=postgres
      - PACT_BROKER_DATABASE_PASSWORD=postgres
      - PACT_BROKER_BASE_URL=http://localhost:9292

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: rw-redis-commander
    depends_on:
      - redis
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rw-pgadmin
    depends_on:
      - postgres
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@haworks.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5055:80"

  # ===========================================================================
  # INITIALIZATION (One-shot)
  # ===========================================================================
  vault-init:
    image: hashicorp/vault:1.15
    container_name: rw-vault-init
    depends_on:
      vault:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=dev-root-token
      - ALLOW_DEV_SEED=yes
      - ConnectionStrings__postgres=Host=postgres;Port=5432;Username=postgres;Password=postgres
    volumes:
      - ../../infra/vault:/manifests
      - ../aspire/vault-init.sh:/init.sh
      - ./vault-creds:/creds
    entrypoint: /bin/sh
    command: /init.sh

  vault-seed:
    image: hashicorp/vault:1.15
    container_name: rw-vault-seed
    depends_on:
      vault-init:
        condition: service_completed_successfully
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=dev-root-token
    volumes:
      - ../../scripts/seed-vault-dev.sh:/seed.sh
    entrypoint: /bin/sh
    command: /seed.sh

  # ===========================================================================
  # SERVICES
  # ===========================================================================
  identity-svc:
    build:
      context: ../..
      dockerfile: src/Identity/Identity.Api/Dockerfile
    container_name: rw-identity-svc
    # Published port lets cross-service E2E tests on the host call
    # /api/Authentication/register and /login directly to mint a real JWT.
    ports:
      - "5070:8080"
    depends_on:
      vault-seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: identity
      OTEL_RESOURCE_ATTRIBUTES: service.instance.id=rw-identity-svc
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__identity: Host=postgres;Port=5432;Database=identity;Username=postgres;Password=postgres
      ConnectionStrings__rabbitmq: amqp://guest:guest@rabbitmq:5672/
      Vault__Enabled: "true"
      Vault__Address: http://vault:8200
      Vault__RoleIdPath: /creds/identity/role_id
      Vault__SecretIdPath: /creds/identity/secret_id
    volumes:
      - ./vault-creds:/creds:ro

  catalog-svc-1:
    build:
      context: ../..
      dockerfile: src/Catalog/Catalog.Api/Dockerfile
    container_name: rw-catalog-svc-1
    depends_on:
      vault-seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: catalog
      OTEL_RESOURCE_ATTRIBUTES: service.instance.id=rw-catalog-svc-1
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__catalog: Host=postgres;Port=5432;Database=catalog;Username=postgres;Password=postgres
      ConnectionStrings__rabbitmq: amqp://guest:guest@rabbitmq:5672/
      Vault__Enabled: "true"
      Vault__Address: http://vault:8200
      Vault__RoleIdPath: /creds/catalog/role_id
      Vault__SecretIdPath: /creds/catalog/secret_id
      Authentication__Jwks__JwksUri: http://identity-svc:8080/.well-known/jwks.json
      Authentication__Jwks__Issuer: http://localhost
      Authentication__Jwks__Audience: haworks-dev
    volumes:
      - ./vault-creds:/creds:ro

  catalog-svc-2:
    build:
      context: ../..
      dockerfile: src/Catalog/Catalog.Api/Dockerfile
    container_name: rw-catalog-svc-2
    depends_on:
      vault-seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: catalog
      OTEL_RESOURCE_ATTRIBUTES: service.instance.id=rw-catalog-svc-2
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__catalog: Host=postgres;Port=5432;Database=catalog;Username=postgres;Password=postgres
      ConnectionStrings__rabbitmq: amqp://guest:guest@rabbitmq:5672/
      Vault__Enabled: "true"
      Vault__Address: http://vault:8200
      Vault__RoleIdPath: /creds/catalog/role_id
      Vault__SecretIdPath: /creds/catalog/secret_id
      Authentication__Jwks__JwksUri: http://identity-svc:8080/.well-known/jwks.json
      Authentication__Jwks__Issuer: http://localhost
      Authentication__Jwks__Audience: haworks-dev
    volumes:
      - ./vault-creds:/creds:ro

  orders-svc:
    build:
      context: ../..
      dockerfile: src/Orders/Orders.Api/Dockerfile
    container_name: rw-orders-svc
    depends_on:
      vault-seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: orders
      OTEL_RESOURCE_ATTRIBUTES: service.instance.id=rw-orders-svc
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__orders: Host=postgres;Port=5432;Database=orders;Username=postgres;Password=postgres
      ConnectionStrings__rabbitmq: amqp://guest:guest@rabbitmq:5672/
      Vault__Enabled: "true"
      Vault__Address: http://vault:8200
      Vault__RoleIdPath: /creds/orders/role_id
      Vault__SecretIdPath: /creds/orders/secret_id
      Authentication__Jwks__JwksUri: http://identity-svc:8080/.well-known/jwks.json
      Authentication__Jwks__Issuer: http://localhost
      Authentication__Jwks__Audience: haworks-dev
    volumes:
      - ./vault-creds:/creds:ro

  payments-svc:
    build:
      context: ../..
      dockerfile: src/Payments/Payments.Api/Dockerfile
    container_name: rw-payments-svc
    depends_on:
      vault-seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: payments
      OTEL_RESOURCE_ATTRIBUTES: service.instance.id=rw-payments-svc
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__payments: Host=postgres;Port=5432;Database=payments;Username=postgres;Password=postgres
      ConnectionStrings__rabbitmq: amqp://guest:guest@rabbitmq:5672/
      Vault__Enabled: "true"
      Vault__Address: http://vault:8200
      Vault__RoleIdPath: /creds/payments/role_id
      Vault__SecretIdPath: /creds/payments/secret_id
      Authentication__Jwks__JwksUri: http://identity-svc:8080/.well-known/jwks.json
      Authentication__Jwks__Issuer: http://localhost
      Authentication__Jwks__Audience: haworks-dev
    volumes:
      - ./vault-creds:/creds:ro

  checkout-svc:
    build:
      context: ../..
      dockerfile: src/CheckoutOrchestrator/CheckoutOrchestrator.Api/Dockerfile
    container_name: rw-checkout-svc
    depends_on:
      vault-seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: checkout
      OTEL_RESOURCE_ATTRIBUTES: service.instance.id=rw-checkout-svc
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__checkout: Host=postgres;Port=5432;Database=checkout;Username=postgres;Password=postgres
      ConnectionStrings__rabbitmq: amqp://guest:guest@rabbitmq:5672/
      Vault__Enabled: "true"
      Vault__Address: http://vault:8200
      Vault__RoleIdPath: /creds/checkout-orchestrator/role_id
      Vault__SecretIdPath: /creds/checkout-orchestrator/secret_id
      Authentication__Jwks__JwksUri: http://identity-svc:8080/.well-known/jwks.json
      Authentication__Jwks__Issuer: http://localhost
      Authentication__Jwks__Audience: haworks-dev
      # CheckoutOptions has [Required] DataAnnotations on these; ValidateOnStart
      # blocks host boot without them. Dev-only placeholders pointing at the BFF.
      Checkout__SuccessUrl: http://localhost:5050/checkout/success
      Checkout__CancelUrl: http://localhost:5050/checkout/cancel
    volumes:
      - ./vault-creds:/creds:ro

  content-svc:
    build:
      context: ../..
      dockerfile: src/Content/Content.Api/Dockerfile
    container_name: rw-content-svc
    # Published port lets cross-service E2E tests on the host hit content-svc
    # directly with a real JWT minted by identity-svc — proves JWKS validation,
    # presigned URLs and the validation pipeline work end-to-end without
    # going through the BFF (which has no content passthrough yet).
    ports:
      - "5060:8080"
    depends_on:
      vault-seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      localstack:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: content
      OTEL_RESOURCE_ATTRIBUTES: service.instance.id=rw-content-svc
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__content: Host=postgres;Port=5432;Database=content;Username=postgres;Password=postgres
      ConnectionStrings__rabbitmq: amqp://guest:guest@rabbitmq:5672/
      Vault__Enabled: "true"
      Vault__Address: http://vault:8200
      Vault__RoleIdPath: /creds/content/role_id
      Vault__SecretIdPath: /creds/content/secret_id
      Authentication__Jwks__JwksUri: http://identity-svc:8080/.well-known/jwks.json
      Authentication__Jwks__Issuer: http://localhost
      Authentication__Jwks__Audience: haworks-dev
      # S3-compatible storage. LocalStack here in compose; Tigris in Fly.
      Storage__ServiceUrl: http://localstack:4566
      Storage__AccessKey: test
      Storage__SecretKey: test
      Storage__BucketName: content-dev
      Storage__Region: us-east-1
      Storage__ForcePathStyle: "true"
    volumes:
      - ./vault-creds:/creds:ro

  search-svc:
    build:
      context: ../..
      dockerfile: src/Search/Search.Api/Dockerfile
    container_name: rw-search-svc
    depends_on:
      elasticsearch:
        condition: service_healthy
      catalog-svc-1:
        condition: service_started
      identity-svc:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: search
      OTEL_RESOURCE_ATTRIBUTES: service.instance.id=rw-search-svc
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__rabbitmq: amqp://guest:guest@rabbitmq:5672/
      Vault__Enabled: "false"
      Elasticsearch__Url: http://elasticsearch:9200
      Elasticsearch__IndexName: products
      Catalog__BaseAddress: http://catalog-svc-1:8080
      Kafka__BootstrapServers: kafka:9092
      Kafka__GroupId: search-svc-cdc
      Authentication__Jwks__JwksUri: http://identity-svc:8080/.well-known/jwks.json
      Authentication__Jwks__Issuer: http://localhost
      Authentication__Jwks__Audience: haworks-dev

  audit-svc:
    build:
      context: ../..
      dockerfile: src/Audit/Audit.Api/Dockerfile
    container_name: rw-audit-svc
    depends_on:
      vault-seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: audit
      OTEL_RESOURCE_ATTRIBUTES: service.instance.id=rw-audit-svc
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__audit: Host=postgres;Port=5432;Database=audit;Username=postgres;Password=postgres
      ConnectionStrings__rabbitmq: amqp://guest:guest@rabbitmq:5672/
      Vault__Enabled: "false"
      Authentication__Jwks__JwksUri: http://identity-svc:8080/.well-known/jwks.json
      Authentication__Jwks__Issuer: http://localhost
      Authentication__Jwks__Audience: haworks-dev

  # ===========================================================================
  # CDC PIPELINE (Kafka + Debezium)
  # ===========================================================================
  kafka:
    image: bitnami/kafka:3.7
    container_name: rw-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  debezium-connect:
    image: debezium/connect:3.0.0.Final
    container_name: rw-debezium-connect
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      - BOOTSTRAP_SERVERS=kafka:9092
      - GROUP_ID=debezium-connect
      - CONFIG_STORAGE_TOPIC=debezium_configs
      - OFFSET_STORAGE_TOPIC=debezium_offsets
      - STATUS_STORAGE_TOPIC=debezium_statuses
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  debezium-init:
    image: curlimages/curl:latest
    container_name: rw-debezium-init
    depends_on:
      debezium-connect:
        condition: service_healthy
    volumes:
      - ../aspire/debezium:/connectors:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Registering Debezium connectors..."
        for f in /connectors/*.json; do
          name=$$(basename "$$f" .json)
          echo "Registering connector: $$name"
          curl -sf -X PUT "http://debezium-connect:8083/connectors/$$name/config" \
               -H 'Content-Type: application/json' \
               -d @"$$f" || echo "WARN: failed to register $$name"
        done
        echo "All connectors registered."

  webhooks-svc:
    build:
      context: ../..
      dockerfile: src/Webhooks/Webhooks.Api/Dockerfile
    container_name: rw-webhooks-svc
    depends_on:
      vault-seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: webhooks
      OTEL_RESOURCE_ATTRIBUTES: service.instance.id=rw-webhooks-svc
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__webhooks: Host=postgres;Port=5432;Database=webhooks;Username=postgres;Password=postgres
      ConnectionStrings__rabbitmq: amqp://guest:guest@rabbitmq:5672/
      Vault__Enabled: "false"
      Kafka__BootstrapServers: kafka:9092
      Kafka__GroupId: webhooks-svc-cdc
      Authentication__Jwks__JwksUri: http://identity-svc:8080/.well-known/jwks.json
      Authentication__Jwks__Issuer: http://localhost
      Authentication__Jwks__Audience: haworks-dev

  bff-web:
    build:
      context: ../..
      dockerfile: src/BffWeb/BffWeb.Api/Dockerfile
    container_name: rw-bff-web
    ports:
      - "5050:8080" # ASPNETCORE_URLS is http://+:8080 in Dockerfile
    depends_on:
      - identity-svc
      - catalog-svc-1
      - catalog-svc-2
      - orders-svc
      - payments-svc
      - checkout-svc
      - content-svc
      - search-svc
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: bff-web
      OTEL_RESOURCE_ATTRIBUTES: service.instance.id=rw-bff-web
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__rabbitmq: amqp://guest:guest@rabbitmq:5672/
      Services__identity-svc__http__0: http://identity-svc:8080
      Services__catalog-svc__http__0: http://catalog-svc-1:8080
      Services__catalog-svc__http__1: http://catalog-svc-2:8080
      Services__orders-svc__http__0: http://orders-svc:8080
      Services__payments-svc__http__0: http://payments-svc:8080
      Services__checkout-svc__http__0: http://checkout-svc:8080
      Services__content-svc__http__0: http://content-svc:8080
      Services__search-svc__http__0: http://search-svc:8080
      Services__webhooks-svc__http__0: http://webhooks-svc:8080
      Kafka__BootstrapServers: kafka:9092
      Kafka__GroupId: bff-web-cdc
      Vault__Enabled: "true"
      Vault__Address: http://vault:8200
      Vault__RoleIdPath: /creds/bff-web/role_id
      Vault__SecretIdPath: /creds/bff-web/secret_id
      Authentication__Jwks__JwksUri: http://identity-svc:8080/.well-known/jwks.json
      Authentication__Jwks__Issuer: http://localhost
      Authentication__Jwks__Audience: haworks-dev
    volumes:
      - ./vault-creds:/creds:ro


# Default values for catalog-svc.
# Override per environment (kind-dev, staging, prod) via --values or --set.

image:
  repository: ghcr.io/haworks/catalog-svc
  tag: "1.0.0"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# In production these come from Vault via the Kubernetes auth method.
# For local kind we let the chart inject inline strings via --set.
config:
  ASPNETCORE_ENVIRONMENT: Production
  ConnectionStrings__catalog: "Host=postgres;Port=5432;Database=catalog;Username=catalog;Password=changeme"
  ConnectionStrings__rabbitmq: "amqp://guest:guest@rabbitmq:5672/"
  Vault__Enabled: "true"
  Vault__Address: "http://vault:8200"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"

# Vault Agent injection — annotations on the pod template tell the
# Kubernetes Vault Agent injector to mount secrets from secret/catalog.
vault:
  enabled: true
  role: catalog-svc
  secretPath: secret/data/catalog

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Liveness uses /health/live (cheap), readiness uses /health/ready (checks
# DB + RabbitMQ). Aspire/OpenTelemetry exposes both at the standard paths.
probes:
  liveness:
    path: /health/live
    initialDelaySeconds: 10
    periodSeconds: 20
  readiness:
    path: /health/ready
    initialDelaySeconds: 5
    periodSeconds: 10

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  readOnlyRootFilesystem: true

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

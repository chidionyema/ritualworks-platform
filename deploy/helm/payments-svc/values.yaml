image:
  repository: ghcr.io/haworks/payments-svc
  tag: "1.0.0"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

config:
  ASPNETCORE_ENVIRONMENT: Production
  ConnectionStrings__payments: "Host=postgres;Port=5432;Database=payments;Username=payments;Password=changeme"
  ConnectionStrings__rabbitmq: "amqp://guest:guest@rabbitmq:5672/"
  Vault__Enabled: "true"
  Vault__Address: "http://vault:8200"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"

vault:
  enabled: true
  role: payments-svc
  # Stripe + PayPal API keys + webhook secrets live under secret/payments
  secretPath: secret/data/payments

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  liveness:
    path: /health/live
    initialDelaySeconds: 10
    periodSeconds: 20
  readiness:
    path: /health/ready
    initialDelaySeconds: 5
    periodSeconds: 10

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  readOnlyRootFilesystem: true

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

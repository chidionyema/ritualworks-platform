image:
  repository: ghcr.io/haworks/bff-web
  tag: "1.0.0"
  pullPolicy: IfNotPresent

# BFF is stateless and tends to fan out — a small replica count handles
# typical SPA load; HPA can scale it horizontally if needed.
replicaCount: 2

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

config:
  ASPNETCORE_ENVIRONMENT: Production
  # Downstream service URLs — DNS names resolve via the cluster.
  Services__Catalog: "http://catalog-svc"
  Services__Orders: "http://orders-svc"
  Services__Payments: "http://payments-svc"
  Services__Identity: "http://identity-svc"
  Services__Content: "http://content-svc"
  Services__CheckoutOrchestrator: "http://checkout-orchestrator-svc"
  ConnectionStrings__rabbitmq: "amqp://guest:guest@rabbitmq:5672/"
  Vault__Enabled: "true"
  Vault__Address: "http://vault:8200"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"

vault:
  enabled: true
  role: bff-web
  secretPath: secret/data/bff-web

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  liveness:
    path: /health/live
    initialDelaySeconds: 10
    periodSeconds: 20
  readiness:
    path: /health/ready
    initialDelaySeconds: 5
    periodSeconds: 10

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  readOnlyRootFilesystem: true

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

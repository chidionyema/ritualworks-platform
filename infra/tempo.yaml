server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
        grpc:

ingester:
  max_block_duration: 5m
  max_block_bytes: 104857600

compactor:
  compaction:
    compaction_window: 1h
    max_block_bytes: 524288000
    block_retention: 168h      # 7 days — matches Loki retention for correlated investigation
    compacted_block_retention: 1h

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal

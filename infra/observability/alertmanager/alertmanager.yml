global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'job']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 4h
  receiver: log-only
  routes:
    - match:
        severity: critical
      receiver: pagerduty
      continue: false
    - match:
        severity: warning
      receiver: slack
      continue: false

receivers:
  - name: log-only
    webhook_configs: []

  - name: pagerduty
    pagerduty_configs:
      - routing_key: '{{ or (env "ALERTMANAGER_PAGERDUTY_KEY") "" }}'
        severity: '{{ .CommonLabels.severity }}'
        description: '{{ .CommonAnnotations.summary }}'

  - name: slack
    slack_configs:
      - api_url: '{{ or (env "ALERTMANAGER_SLACK_WEBHOOK") "" }}'
        channel: '#alerts'
        title: '{{ .CommonLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['job']

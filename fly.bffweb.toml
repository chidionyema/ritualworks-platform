# Per-service fly.toml. Deploy from the repo root with:
#   flyctl deploy -c fly.bffweb.toml
# Build context = repo root, so the Dockerfile can pull in Directory.Build.props
# and the shared BuildingBlocks/Contracts projects.

app            = "haworks-bffweb"
primary_region = "iad"

[build]
  dockerfile = "src/BffWeb/BffWeb.Api/Dockerfile"

[env]
  ASPNETCORE_URLS        = "http://+:8080"
  ASPNETCORE_ENVIRONMENT = "Production"

  # Microsoft.Extensions.ServiceDiscovery overrides for the BFF's HttpClients.
  # Keys must match BackendClients.cs constants exactly (the hyphenated names
  # are intentional). These live here, not in `flyctl secrets`, because Fly's
  # secrets API rejects hyphens in names — and these aren't secrets anyway,
  # just internal Fly 6PN hostnames.
  #
  # Why .internal not .flycast: .flycast is Fly's load-balanced private
  # endpoint, but its proxy was returning "Connection reset by peer" for
  # this cluster's HTTP/8080 traffic. .internal hits the machine's 6PN
  # IP directly, no LB in the path.
  "Services__identity-svc__http__0"  = "http://haworks-identity.internal:8080"
  "Services__catalog-svc__http__0"   = "http://haworks-catalog.internal:8080"
  "Services__orders-svc__http__0"    = "http://haworks-orders.internal:8080"
  "Services__payments-svc__http__0"  = "http://haworks-payments.internal:8080"
  "Services__checkout-svc__http__0"  = "http://haworks-checkout.internal:8080"
  "Services__search-svc__http__0"    = "http://haworks-search.internal:8080"

  # OpenTelemetry resource identity. Fly's [env] is static (no ${VAR}
  # interpolation), so the OTLP endpoint must be set out-of-band via:
  #   fly secrets set OTEL_EXPORTER_OTLP_ENDPOINT=... -a haworks-bffweb
  OTEL_SERVICE_NAME         = "bff-web"
  OTEL_RESOURCE_ATTRIBUTES  = "deployment.environment=production,service.namespace=haworks"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes           = ["app"]

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 200
    hard_limit = 250


  # Zero-downtime: Fly only routes traffic after readiness check passes.
  # Old machine keeps serving until new one is healthy.

[[http_service.checks]]
  grace_period = "30s"
  interval     = "10s"
  method       = "GET"
  timeout      = "5s"
  path         = "/health/ready"

[deploy]
  strategy = "rolling"
[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

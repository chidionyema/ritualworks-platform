# Internal-only service. Reach via http://haworks-meilisearch.internal:7700
# (same .internal-not-.flycast convention as the rest of this cluster — see
# fly.bffweb.toml's [env] comment for the rationale).

app            = "haworks-meilisearch"
primary_region = "iad"

[build]
  image = "getmeili/meilisearch:v1.10"

[env]
  MEILI_NO_ANALYTICS = "true"
  MEILI_ENV          = "production"
  MEILI_DB_PATH      = "/meili_data/data.ms"
  # Bind to IPv6 wildcard (also accepts IPv4 on dual-stack). Fly's 6PN
  # private network — which the .internal DNS resolves to — is IPv6, so
  # an IPv4-only bind ("0.0.0.0:7700") gets "connection refused" from
  # other Fly apps even though Meilisearch logs say it's listening.
  MEILI_HTTP_ADDR    = "[::]:7700"

[mounts]
  source       = "meili_data"
  destination  = "/meili_data"
  initial_size = "1gb"

[http_service]
  internal_port        = 7700
  force_https          = false
  auto_stop_machines   = "off"   # stateful — never autostop the volume's machine
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1

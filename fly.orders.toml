# Internal-only service. Reach via http://ritualworks-orders.flycast:8080

app            = "ritualworks-orders"
primary_region = "iad"

[build]
  dockerfile = "src/Orders/Orders.Api/Dockerfile"

[env]
  ASPNETCORE_URLS        = "http://+:8080"
  ASPNETCORE_ENVIRONMENT = "Production"

[http_service]
  internal_port        = 8080
  force_https          = false
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

name: Architecture

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    name: Project-reference graph + cross-cutting decoupling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-architecture.sh
        # Soft warnings (exit 2) shouldn't fail the build yet — they track
        # coupling that exists today and will be cleared as services are
        # refactored. Hard violations (exit 1) DO fail.
        continue-on-error: false

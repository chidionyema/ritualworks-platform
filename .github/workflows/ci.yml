name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs of the same workflow on the same branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  # Enforce the same regex timeout fix the per-assembly module init applies
  # locally — belt-and-braces in case CI's Testcontainers tag matching is
  # subject to the same backtracking.
  TESTCONTAINERS_RYUK_DISABLED: true

jobs:
  # Fast path — builds the solution and runs everything that doesn't need
  # Docker. Fails the PR in <2 minutes if the build, unit, architecture,
  # or Pact tests are broken.
  build-and-fast-tests:
    name: Build + unit/arch/contract
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore RitualworksPlatform.sln

      - name: Build (no restore)
        run: dotnet build RitualworksPlatform.sln --no-restore --configuration Release

      - name: Unit tests
        run: |
          shopt -s nullglob
          # Only test projects that are in the solution (avoids broken scaffolds)
          sln_projects=$(dotnet sln RitualworksPlatform.sln list 2>/dev/null | tail -n +3)
          printf '%s\n' tests/*/*.Unit/*.csproj tests/*.Unit/*.csproj | awk -F/ '!seen[$NF]++' | while read -r proj; do
            if echo "$sln_projects" | grep -qF "$(basename "$proj")"; then
              dotnet test "$proj" --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --logger "console;verbosity=minimal"
            fi
          done

      - name: Architecture tests
        run: |
          shopt -s nullglob
          sln_projects=$(dotnet sln RitualworksPlatform.sln list 2>/dev/null | tail -n +3)
          printf '%s\n' tests/*/*.Architecture/*.csproj tests/*.Architecture/*.csproj | awk -F/ '!seen[$NF]++' | while read -r proj; do
            if echo "$sln_projects" | grep -qF "$(basename "$proj")"; then
              dotnet test "$proj" --no-build --configuration Release --logger "console;verbosity=minimal"
            fi
          done

      - name: Contract (Pact) tests
        run: |
          shopt -s nullglob
          sln_projects=$(dotnet sln RitualworksPlatform.sln list 2>/dev/null | tail -n +3)
          printf '%s\n' tests/*/*.Contract/*.csproj tests/*.Contract/*.csproj | awk -F/ '!seen[$NF]++' | while read -r proj; do
            if echo "$sln_projects" | grep -qF "$(basename "$proj")"; then
              dotnet test "$proj" --no-build --configuration Release --logger "console;verbosity=minimal"
            fi
          done

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fast-test-results
          path: '**/TestResults/*.trx'
          retention-days: 7

  # Slow path — Testcontainers integration tests. One job per service so a
  # flake in one suite doesn't block the others, and so per-service timing
  # is visible at a glance.
  integration-tests:
    name: Integration / ${{ matrix.suite }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-fast-tests
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: Catalog
            path: tests/Catalog/Catalog.Integration
          - suite: Orders
            path: tests/Orders/Orders.Integration
          - suite: Payments
            path: tests/Payments/Payments.Integration
          - suite: Identity
            path: tests/Identity/Identity.Integration
          - suite: BffWeb
            path: tests/BffWeb/BffWeb.Integration
          - suite: CheckoutOrchestrator
            path: tests/CheckoutOrchestrator/CheckoutOrchestrator.Integration
          - suite: Content
            path: tests/Content/Content.Integration
          - suite: Search
            path: tests/Search/Search.Integration
          - suite: Audit
            path: tests/Audit/Audit.Integration
          - suite: Notifications
            path: tests/Notifications/Notifications.Integration
          - suite: Webhooks
            path: tests/Webhooks/Webhooks.Integration
          - suite: Payouts
            path: tests/Payouts.Integration
          - suite: Scheduler
            path: tests/Scheduler.Integration

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      # Linux runners have Docker pre-installed and dockerd running. The
      # default socket lives at /var/run/docker.sock — same as the override
      # the local test module init falls back to. Confirm it's reachable
      # before kicking off the suite so a Docker outage shows up here, not
      # buried in a Testcontainers stack trace 5 minutes in.
      - name: Verify Docker
        run: docker info

      # Cache the Docker images Testcontainers pulls on every run so we
      # don't burn 10-30s pulling them from Docker Hub each invocation.
      # Key is pinned to the exact image tags — bumping a tag invalidates
      # the cache automatically. Both images are saved together because
      # actions/cache requires a single path tree; the meili tarball is
      # ~150MB compressed which is well within the 10GB cache budget.
      - name: Cache Docker test images
        id: docker-image-cache
        uses: actions/cache@v5
        with:
          path: /tmp/docker-images
          key: docker-images-${{ runner.os }}-pg16-es8.17-kafka7.6-rabbit3

      - name: Load cached Docker images
        if: steps.docker-image-cache.outputs.cache-hit == 'true'
        run: |
          for f in /tmp/docker-images/*.tar; do docker load -i "$f"; done

      - name: Pull and save images for cache
        if: steps.docker-image-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-images
          images=(
            postgres:16-alpine
            docker.elastic.co/elasticsearch/elasticsearch:8.17.0
            confluentinc/cp-kafka:7.6.1
            rabbitmq:3-management
          )
          for img in "${images[@]}"; do
            docker pull "$img"
            docker save "$img" -o "/tmp/docker-images/$(echo "$img" | tr '/:' '-').tar"
          done

      - name: Restore + build ${{ matrix.suite }}.Integration
        run: |
          dotnet restore ${{ matrix.path }}/${{ matrix.suite }}.Integration.csproj
          dotnet build ${{ matrix.path }}/${{ matrix.suite }}.Integration.csproj --no-restore --configuration Release

      - name: Run ${{ matrix.suite }}.Integration
        run: |
          dotnet test ${{ matrix.path }}/${{ matrix.suite }}.Integration.csproj \
            --no-build --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=normal"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ matrix.suite }}
          path: '**/TestResults/*.trx'
          retention-days: 7

  smoke-and-e2e:
    name: Smoke + E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build-and-fast-tests
    # Manual dispatch only. The fixture spins up the entire Aspire AppHost
    # (Postgres, Redis, RabbitMQ, Vault, MinIO, ClamAV, Tempo) in-process,
    # which doesn't reliably bootstrap on a headless GitHub runner — BFF
    # fails to become reachable through Aspire's test reverse-proxy within
    # the 100s HttpClient timeout. Locally devs still run via Aspire:
    #   dotnet test tests/Smoke
    # Once the Fly deploy is live we can add a workflow_run trigger that
    # fires smoke + E2E against the deployed URL via SMOKE_TARGET_URL.
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Verify Docker
        run: docker info

      - name: Install Playwright browsers
        run: |
          dotnet build tests/E2E/E2E.csproj
          pwsh tests/E2E/bin/Debug/net9.0/playwright.ps1 install --with-deps

      - name: Run Smoke tests
        run: |
          dotnet test tests/Smoke/Smoke.csproj --configuration Release

      - name: Run E2E tests
        env:
          E2E_ENABLED: "1"
        run: |
          dotnet test tests/E2E/E2E.csproj --configuration Release

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-e2e-test-results
          path: '**/TestResults/*.trx'
          retention-days: 7

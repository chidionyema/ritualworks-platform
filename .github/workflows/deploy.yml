name: Deploy

# Triggers:
#   - push to main: gated on CI passing (workflow_run + conclusion check)
#   - manual dispatch from the Actions tab
#
# Steady-state operator workflow: `git push to main`. This workflow handles
# the entire deploy chain — vault-pg sandbox, vault prod-mode, capturing
# init keys + AppRole creds, staging them on identity, then rolling all
# changed backends + the BFF. No more "run bootstrap.sh, then deploy, then
# re-run bootstrap.sh, then re-deploy" dance.
#
# Path filtering: each deploy job is gated on whether its files actually
# changed in this push. A typical "fix one service" PR drops from ~7min
# (deploy everything) to ~90s (deploy that one service). workflow_dispatch
# always rolls everything (force redeploy via the Actions UI button).
#
# First-time setup is `cp .env.example .env.local`, fill in three URLs
# (RABBITMQ_URL, REDIS_URL, POSTGRES_BASE), run `./deploy/fly/bootstrap.sh`
# once to create the Fly apps + volumes + stage non-vault secrets. After
# that everything is push-driven.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bypass_vault_capture:
        description: "Skip the stage-vault-creds step (vault keys already staged)"
        required: false
        type: boolean
        default: false
      force_all:
        description: "Deploy every service regardless of what changed (default true on dispatch)"
        required: false
        type: boolean
        default: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changed paths
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      vault_pg: ${{ steps.filter.outputs.vault_pg }}
      vault: ${{ steps.filter.outputs.vault }}
      identity: ${{ steps.filter.outputs.identity }}
      catalog: ${{ steps.filter.outputs.catalog }}
      orders: ${{ steps.filter.outputs.orders }}
      payments: ${{ steps.filter.outputs.payments }}
      checkout: ${{ steps.filter.outputs.checkout }}
      search: ${{ steps.filter.outputs.search }}
      meilisearch: ${{ steps.filter.outputs.meilisearch }}
      content: ${{ steps.filter.outputs.content }}
      notifications: ${{ steps.filter.outputs.notifications }}
      bff: ${{ steps.filter.outputs.bff }}
      shared: ${{ steps.filter.outputs.shared }}
      audit: ${{ steps.filter.outputs.audit }}
      cdc: ${{ steps.filter.outputs.cdc }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # `shared` (BuildingBlocks / Contracts / build props) triggers
          # everything because every service depends on those.
          # Service-specific filters trigger only that service.
          # toml + Dockerfile changes trigger their owning service.
          filters: |
            shared:
              - 'src/BuildingBlocks/**'
              - 'src/Contracts/**'
              - 'Directory.Build.props'
              - '.github/workflows/deploy.yml'
            vault_pg:
              - 'fly.vault-pg.toml'
            vault:
              - 'fly.vault.toml'
              - 'deploy/vault/**'
            identity:
              - 'src/Identity/**'
              - 'fly.identity.toml'
              - 'deploy/identity/**'
            catalog:
              - 'src/Catalog/**'
              - 'fly.catalog.toml'
            orders:
              - 'src/Orders/**'
              - 'fly.orders.toml'
            payments:
              - 'src/Payments/**'
              - 'fly.payments.toml'
            checkout:
              - 'src/CheckoutOrchestrator/**'
              - 'fly.checkout.toml'
            search:
              - 'src/Search/**'
              - 'fly.search.toml'
            meilisearch:
              - 'fly.meilisearch.toml'
            content:
              - 'src/Content/**'
              - 'fly.content.toml'
            notifications:
              - 'src/Notifications/**'
              - 'fly.notifications.toml'
            audit:
              - 'src/Audit/**'
              - 'fly.audit.toml'
            cdc:
              - 'src/Cdc/**'
              - 'fly.cdc.toml'
            bff:
              - 'src/BffWeb/**'
              - 'fly.bffweb.toml'

  plan:
    name: Plan service matrix
    needs: changes
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}
      deploy_vault: ${{ steps.set.outputs.deploy_vault }}
      deploy_vault_pg: ${{ steps.set.outputs.deploy_vault_pg }}
      deploy_bff: ${{ steps.set.outputs.deploy_bff }}
    env:
      FORCE_ALL: ${{ inputs.force_all || false }}
      C_SHARED: ${{ needs.changes.outputs.shared }}
      C_VAULT: ${{ needs.changes.outputs.vault }}
      C_VAULT_PG: ${{ needs.changes.outputs.vault_pg }}
      C_IDENTITY: ${{ needs.changes.outputs.identity }}
      C_CATALOG: ${{ needs.changes.outputs.catalog }}
      C_ORDERS: ${{ needs.changes.outputs.orders }}
      C_PAYMENTS: ${{ needs.changes.outputs.payments }}
      C_CHECKOUT: ${{ needs.changes.outputs.checkout }}
      C_SEARCH: ${{ needs.changes.outputs.search }}
      C_MEILISEARCH: ${{ needs.changes.outputs.meilisearch }}
      C_CONTENT: ${{ needs.changes.outputs.content }}
      C_NOTIFICATIONS: ${{ needs.changes.outputs.notifications }}
      C_BFF: ${{ needs.changes.outputs.bff }}
      C_AUDIT: ${{ needs.changes.outputs.audit }}
      C_CDC: ${{ needs.changes.outputs.cdc }}
    steps:
      - id: set
        run: |
          # Build matrix of services to deploy. shared change OR force → all.
          # Otherwise only services whose paths changed.
          services=()
          add_if() { [[ "$2" == "true" || "$3" == "true" || "$FORCE_ALL" == "true" ]] && services+=("$1"); return 0; }

          add_if identity      "$C_IDENTITY"      "$C_SHARED"
          add_if catalog       "$C_CATALOG"       "$C_SHARED"
          add_if orders        "$C_ORDERS"        "$C_SHARED"
          add_if payments      "$C_PAYMENTS"      "$C_SHARED"
          add_if checkout      "$C_CHECKOUT"      "$C_SHARED"
          add_if search        "$C_SEARCH"        "$C_SHARED"
          add_if notifications "$C_NOTIFICATIONS" "$C_SHARED"
          add_if meilisearch   "$C_MEILISEARCH"   "false"  # no shared triggers meili
          if [[ "${{ vars.DEPLOY_CONTENT }}" == "true" ]]; then
            add_if content "$C_CONTENT" "$C_SHARED"
          add_if audit        "$C_AUDIT" "$C_SHARED"
          add_if cdc          "$C_CDC" "$C_SHARED"
          fi

          if [[ ${#services[@]} -eq 0 ]]; then
            echo 'services=[]' >> "$GITHUB_OUTPUT"
          else
            json=$(printf '"%s",' "${services[@]}")
            json="[${json%,}]"
            echo "services=$json" >> "$GITHUB_OUTPUT"
          fi

          # vault-pg: only if its toml changed (no shared deps)
          if [[ "$C_VAULT_PG" == "true" || "$FORCE_ALL" == "true" ]]; then
            echo "deploy_vault_pg=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_vault_pg=false" >> "$GITHUB_OUTPUT"
          fi

          # vault: deploy if vault files OR shared changed
          if [[ "$C_VAULT" == "true" || "$C_SHARED" == "true" || "$FORCE_ALL" == "true" ]]; then
            echo "deploy_vault=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_vault=false" >> "$GITHUB_OUTPUT"
          fi

          # bff: deploy if bff files OR shared changed
          if [[ "$C_BFF" == "true" || "$C_SHARED" == "true" || "$FORCE_ALL" == "true" ]]; then
            echo "deploy_bff=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_bff=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Matrix: ${services[*]:-(none)}"

  deploy-vault-pg:
    name: Deploy vault-pg
    needs: plan
    if: ${{ needs.plan.outputs.deploy_vault_pg == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy -c fly.vault-pg.toml --remote-only

  deploy-vault:
    name: Deploy vault
    needs: plan
    if: ${{ needs.plan.outputs.deploy_vault == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy -c fly.vault.toml --remote-only

  stage-vault-creds:
    # Runs only when vault was deployed in this run (and only if not bypassed).
    # When vault wasn't redeployed there's nothing to capture — the staged
    # creds from the previous run are still valid.
    name: Stage vault creds
    needs: [plan, deploy-vault]
    if: ${{ needs.plan.outputs.deploy_vault == 'true' && inputs.bypass_vault_capture != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Capture init keys + AppRole creds and stage on identity
        run: bash deploy/fly/ci-stage-vault-creds.sh

  deploy-backends:
    # Backends roll in parallel after vault-pg, vault and stage-vault-creds
    # are all settled (or skipped). The `if` runs the matrix only when
    # there's a non-empty service list to deploy. `always()` lets us wait
    # on prerequisite jobs that may have been skipped.
    name: Deploy ${{ matrix.svc }}
    needs: [plan, deploy-vault-pg, deploy-vault, stage-vault-creds]
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.services != '[]' && (needs.deploy-vault.result == 'success' || needs.deploy-vault.result == 'skipped') && (needs.stage-vault-creds.result == 'success' || needs.stage-vault-creds.result == 'skipped') && (needs.deploy-vault-pg.result == 'success' || needs.deploy-vault-pg.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        svc: ${{ fromJSON(needs.plan.outputs.services) }}
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy -c fly.${{ matrix.svc }}.toml --remote-only

  deploy-bff:
    name: Deploy bffweb
    needs: [plan, deploy-backends]
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.deploy_bff == 'true' && (needs.deploy-backends.result == 'success' || needs.deploy-backends.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy -c fly.bffweb.toml --remote-only

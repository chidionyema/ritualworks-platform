name: Deploy

# Triggers:
#   - push to main: gated on CI passing (workflow_run + conclusion check)
#   - manual dispatch from the Actions tab
#
# Runtime secrets (Postgres, RabbitMQ, etc.) are NOT touched here. They live
# in Fly secrets and are set once via deploy/fly/bootstrap.sh from a developer
# machine. CI only knows the Fly API token.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-backends:
    name: Deploy ${{ matrix.svc }}
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # `content` is omitted: bootstrap.sh only creates the app when
        # DEPLOY_CONTENT=true. Add it back here when content goes live.
        svc: [identity, catalog, orders, payments, checkout]
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy ${{ matrix.svc }}
        run: flyctl deploy -c fly.${{ matrix.svc }}.toml --remote-only

  deploy-bff:
    name: Deploy bffweb
    needs: deploy-backends
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy bffweb
        run: flyctl deploy -c fly.bffweb.toml --remote-only

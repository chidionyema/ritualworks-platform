name: Deploy

# Triggers:
#   - push to main: gated on CI passing (workflow_run + conclusion check)
#   - manual dispatch from the Actions tab
#
# Runtime secrets (Postgres, RabbitMQ, etc.) are NOT touched here. They live
# in Fly secrets and are set once via deploy/fly/bootstrap.sh from a developer
# machine. CI only knows the Fly API token.
#
# Service set: identity/catalog/orders/payments/checkout always deploy. The
# content service deploys only when the repo variable DEPLOY_CONTENT == "true"
# AND bootstrap.sh was run with DEPLOY_CONTENT=true (so the Fly app exists).
# The two switches share the same name on purpose: one source of truth, set
# in two places that can't talk to each other.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan service matrix
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}
    steps:
      - id: set
        run: |
          if [[ "${{ vars.DEPLOY_CONTENT }}" == "true" ]]; then
            echo 'services=["identity","catalog","orders","payments","checkout","content","search","meilisearch"]' >> "$GITHUB_OUTPUT"
          else
            echo 'services=["identity","catalog","orders","payments","checkout","search","meilisearch"]' >> "$GITHUB_OUTPUT"
          fi

  deploy-backends:
    name: Deploy ${{ matrix.svc }}
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        svc: ${{ fromJSON(needs.plan.outputs.services) }}
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy ${{ matrix.svc }}
        run: flyctl deploy -c fly.${{ matrix.svc }}.toml --remote-only

  deploy-bff:
    name: Deploy bffweb
    needs: deploy-backends
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy bffweb
        run: flyctl deploy -c fly.bffweb.toml --remote-only

app = "haworks-analytics"
primary_region = "iad"
[build]
  dockerfile = "src/Analytics/Analytics.Api/Dockerfile"
[env]
  ASPNETCORE_URLS = "http://+:8080"
  ASPNETCORE_ENVIRONMENT = "Production"
  OTEL_SERVICE_NAME = "analytics-svc"
  OTEL_RESOURCE_ATTRIBUTES = "deployment.environment=production,service.namespace=haworks"
[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
[[http_service.checks]]
  grace_period = "30s"
  interval = "10s"
  method = "GET"
  timeout = "5s"
  path = "/health/ready"
[deploy]
  strategy = "rolling"
[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

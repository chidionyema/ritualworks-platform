# Internal-only service. Reach via http://ritualworks-search.internal:8080
# (same .internal-not-.flycast convention as the rest of this cluster — see
# fly.bffweb.toml's [env] comment for the rationale).

app            = "ritualworks-search"
primary_region = "iad"

[build]
  dockerfile = "src/Search/Search.Api/Dockerfile"

[env]
  ASPNETCORE_URLS        = "http://+:8080"
  ASPNETCORE_ENVIRONMENT = "Production"
  Meilisearch__Url       = "http://ritualworks-meilisearch.internal:7700"

[http_service]
  internal_port        = 8080
  force_https          = false
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

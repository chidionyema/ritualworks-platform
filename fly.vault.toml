# Vault prod-mode with raft storage on a Fly volume. State persists
# across container restarts/redeploys/OOMs — no more reseed dance every
# time the container bounces.
#
# Reach from other Fly machines at:
#   http://haworks-vault.internal:8200
#
# Deploy:
#   flyctl apps create haworks-vault                     # one-time
#   flyctl volumes create vault_data --size 1 -a haworks-vault --yes
#   flyctl deploy -c fly.vault.toml
#   ./deploy/fly/bootstrap.sh                                # captures unseal key + root token
#
# After the first run bootstrap.sh stages VAULT_UNSEAL_KEY and
# VAULT_ROOT_TOKEN_PROD as Fly secrets so future restarts auto-unseal.

app            = "haworks-vault"
primary_region = "iad"

[build]
  dockerfile = "deploy/vault/Dockerfile"

[env]
  VAULT_ADDR = "http://127.0.0.1:8200"
  # VAULT_UNSEAL_KEY and VAULT_ROOT_TOKEN_PROD are staged as Fly secrets
  # by deploy/fly/bootstrap.sh after the first vault deploy + init.

[deploy]
  # Replace the existing machine — raft storage is on the persistent
  # volume so the new machine reads the same state. immediate = stop the
  # old one first, then start the new one. Brief downtime is fine for a
  # demo and avoids two machines fighting over volume mount.
  strategy = "immediate"

[mounts]
  # Persistent raft storage. Vault writes its initialized + unsealed
  # state, AppRole config, KV data, and secret IDs here. Survives
  # container restarts.
  source      = "vault_data"
  destination = "/vault/data"

[http_service]
  internal_port        = 8200
  force_https          = false
  auto_stop_machines   = "off"
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]

  # Health check uses /v1/sys/health which 200s when active+unsealed,
  # 429 when standby, 472 when DR secondary, 501 when uninitialized,
  # 503 when sealed. We accept all of those as "process is up"; the
  # entrypoint handles unsealing autonomously.
  [[http_service.checks]]
    interval     = "10s"
    timeout      = "2s"
    grace_period = "60s"
    method       = "GET"
    path         = "/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1

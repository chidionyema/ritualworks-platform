# Internal-only service. Reach via http://haworks-checkout.flycast:8080

app            = "haworks-checkout"
primary_region = "iad"

[build]
  dockerfile = "src/CheckoutOrchestrator/CheckoutOrchestrator.Api/Dockerfile"

[env]
  ASPNETCORE_URLS        = "http://+:8080"
  ASPNETCORE_ENVIRONMENT = "Production"

  # OpenTelemetry resource identity. Fly's [env] is static (no ${VAR}
  # interpolation), so the OTLP endpoint must be set out-of-band via:
  #   fly secrets set OTEL_EXPORTER_OTLP_ENDPOINT=... -a haworks-checkout
  OTEL_SERVICE_NAME         = "checkout-svc"
  OTEL_RESOURCE_ATTRIBUTES  = "deployment.environment=production,service.namespace=haworks"

[http_service]
  internal_port        = 8080
  force_https          = false
  auto_stop_machines   = "off"
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]


  # Zero-downtime: Fly only routes traffic after readiness check passes.
  # Old machine keeps serving until new one is healthy.

[[http_service.checks]]
  grace_period = "30s"
  interval     = "10s"
  method       = "GET"
  timeout      = "5s"
  path         = "/health/ready"

[deploy]
  strategy = "rolling"
[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
